apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: demo/api:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: COMPUTE_SERVICE_URL
              value: "http://compute-service.demo:8080"
            - name: COMPUTE_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: compute-auth
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
